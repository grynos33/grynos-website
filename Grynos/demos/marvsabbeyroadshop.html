<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Store — Marv's Abbey Road Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --accent-1: #fbbf24;
            --accent-2: #f59e0b;
            --text: #1f2937;
            --muted: #6b7280;
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: rgba(255,255,255,0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(251,191,36,.1) 0%, transparent 65%); z-index: 0; pointer-events: none; }

        .cursor-dot, .cursor-halo { position: fixed; top: 0; left: 0; border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 9999; }
        .cursor-dot { width: 8px; height: 8px; background: var(--accent-2); box-shadow: 0 0 10px var(--accent-1); }
        .cursor-halo { width: 40px; height: 40px; border: 1px solid rgba(245,158,11,.6); transition: width .3s, height .3s, background .3s; }
        .cursor-halo.active { width: 60px; height: 60px; background: rgba(251,191,36,.1); border-color: var(--accent-2); }

        .site-header { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.82); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--glass-border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; flex-direction: column; }
        .store-name { font-size: 1.1rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .store-tagline { font-size: .72rem; color: var(--muted); font-weight: 600; margin-top: 1px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .back-link { color: var(--muted); text-decoration: none; font-size: .82rem; font-weight: 600; transition: color .2s; }
        .back-link:hover { color: var(--accent-2); }
        .cart-btn { position: relative; background: none; border: none; font-size: 1.4rem; padding: 4px; transition: transform .2s; }
        .cart-btn:hover { transform: scale(1.12); }
        .cart-badge { position: absolute; top: -4px; right: -6px; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: #1a1a1a; font-size: .65rem; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(251,191,36,.45); }
        .cart-badge.hidden { display: none; }

        .filter-bar { position: sticky; top: 61px; z-index: 40; background: rgba(252,251,247,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,.06); padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; }
        .filter-tab { background: transparent; border: 1.5px solid rgba(0,0,0,.1); border-radius: 20px; padding: 6px 18px; font-family: 'Outfit',sans-serif; font-size: .83rem; font-weight: 600; color: var(--muted); white-space: nowrap; transition: all .15s; }
        .filter-tab:hover { border-color: var(--accent-2); color: var(--text); }
        .filter-tab.active { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border-color: transparent; color: #111; box-shadow: 0 3px 10px rgba(251,191,36,0.35); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 16px; padding: 24px 20px 40px; position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
        .product-card { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.05); display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.09); }
        .product-card.hidden { display: none; }
        .album-art { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .product-info { padding: 14px 14px 0; flex: 1; }
        .album-title { font-weight: 700; font-size: .9rem; line-height: 1.3; }
        .album-artist { font-size: .78rem; color: var(--muted); margin-top: 2px; }
        .genre-badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 8px; margin-top: 6px; }
        .price { font-size: 1rem; font-weight: 800; margin-top: 8px; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .add-btn { margin: 12px 14px 14px; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border: none; border-radius: 12px; padding: 10px; font-family: 'Outfit',sans-serif; font-size: .83rem; font-weight: 700; color: #1a1a1a; box-shadow: 0 3px 10px rgba(251,191,36,.35); transition: transform .15s, box-shadow .15s; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,158,11,.45); }

        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(3px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s; }
        .cart-overlay.open { opacity: 1; pointer-events: auto; }

        .cart-sidebar { position: fixed; top: 0; right: 0; width: min(380px,100vw); height: 100%; background: rgba(252,251,247,.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s ease; box-shadow: -8px 0 40px rgba(0,0,0,.1); }
        .cart-sidebar.open { transform: translateX(0); }
        .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 1px solid rgba(0,0,0,.07); }
        .cart-title { font-size: 1rem; font-weight: 700; }
        .cart-close { background: none; border: none; font-size: 1.4rem; color: var(--muted); line-height: 1; padding: 2px; transition: color .2s; }
        .cart-close:hover { color: var(--text); }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
        .cart-item { display: flex; gap: 12px; align-items: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 10px 12px; }
        .cart-item-art { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item-price { font-size: .75rem; color: var(--muted); }
        .qty-controls { display: flex; align-items: center; gap: 6px; }
        .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,.1); background: rgba(255,255,255,.7); font-size: .9rem; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
        .qty-btn:hover { border-color: var(--accent-2); }
        .qty-display { font-size: .9rem; font-weight: 700; min-width: 18px; text-align: center; }
        .remove-item-btn { background: none; border: none; color: #d1d5db; font-size: 1rem; padding: 4px; border-radius: 4px; transition: color .15s; }
        .remove-item-btn:hover { color: #ef4444; }
        .cart-empty { color: var(--muted); font-size: .88rem; text-align: center; padding: 32px 0; }
        .cart-footer { padding: 16px 20px; border-top: 1px solid rgba(0,0,0,.07); }
        .cart-subtotal { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .subtotal-label { font-size: .85rem; color: var(--muted); font-weight: 600; }
        .subtotal-amount { font-size: 1.15rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .checkout-btn { width: 100%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border: none; border-radius: 14px; padding: 14px; font-family: 'Outfit',sans-serif; font-size: .95rem; font-weight: 700; color: #1a1a1a; box-shadow: 0 4px 14px rgba(251,191,36,.4); transition: transform .15s, box-shadow .15s; }
        .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(245,158,11,.5); }
        .checkout-btn:disabled { opacity: .4; transform: none; box-shadow: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity .2s; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-box { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 24px; padding: 36px 28px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.12); transform: scale(.95); transition: transform .2s; }
        .modal-overlay.open .modal-box { transform: scale(1); }
        .modal-emoji { font-size: 2.8rem; margin-bottom: 12px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .modal-text { font-size: .88rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
        .modal-close-btn { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border: none; border-radius: 14px; padding: 12px 36px; font-family: 'Outfit',sans-serif; font-size: .9rem; font-weight: 700; color: #1a1a1a; box-shadow: 0 4px 14px rgba(251,191,36,.35); transition: transform .15s; }
        .modal-close-btn:hover { transform: translateY(-2px); }

        .cart-items::-webkit-scrollbar { width: 4px; }
        .cart-items::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
        @media (max-width: 480px) { .product-grid { grid-template-columns: repeat(2,1fr); padding: 16px; gap: 12px; } }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-halo" id="cursorHalo"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="bg-glow"></div>

    <header class="site-header">
        <div class="header-left">
            <div class="store-name">Vinyl E-commerce Store</div>
        </div>
        <div class="header-right">
            <a href="https://grynos.info" class="back-link">← Back to grynos.info</a>
            <button class="cart-btn" onclick="openCart()">
                🛒
                <div class="cart-badge hidden" id="cartBadge">0</div>
            </button>
        </div>
    </header>

    <div class="filter-bar">
        <button class="filter-tab active" onclick="filterBy('all',this)">All</button>
        <button class="filter-tab" onclick="filterBy('Rock',this)">Rock</button>
        <button class="filter-tab" onclick="filterBy('Jazz',this)">Jazz</button>
        <button class="filter-tab" onclick="filterBy('Soul',this)">Soul</button>
        <button class="filter-tab" onclick="filterBy('Pop',this)">Pop</button>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <span class="cart-title">Your Cart</span>
            <button class="cart-close" onclick="closeCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-subtotal">
                <span class="subtotal-label">Subtotal</span>
                <span class="subtotal-amount" id="subtotalAmount">₱0</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="openCheckoutModal()" disabled>Checkout</button>
        </div>
    </div>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-box">
            <div class="modal-emoji">🎵</div>
            <div class="modal-title">Thanks for browsing!</div>
            <div class="modal-text">This is a demo store. The real Marvsabbeyroadshop is coming soon — with real vinyls, real checkout, and real music.</div>
            <button class="modal-close-btn" onclick="closeCheckoutModal()">Got it!</button>
        </div>
    </div>

    <script>
        /* ── Cursor ── */
        const dot=document.getElementById('cursorDot'),halo=document.getElementById('cursorHalo');
        document.addEventListener('mousemove',e=>{dot.style.left=halo.style.left=e.clientX+'px';dot.style.top=halo.style.top=e.clientY+'px';});
        document.querySelectorAll('button,a').forEach(el=>{el.addEventListener('mouseenter',()=>halo.classList.add('active'));el.addEventListener('mouseleave',()=>halo.classList.remove('active'));});

        /* ── Particles ── */
        const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
        let W,H,particles=[];
        const CONNECT_SQ=120*120,MAX_P=80;
        function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
        window.addEventListener('resize',()=>{resize();initP();}); resize();
        class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.5;this.vy=(Math.random()-.5)*.5;this.r=Math.random()*2+1;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(245,158,11,0.35)';ctx.fill();}}
        function initP(){particles=[];const n=Math.min(Math.floor(W*H/9000),MAX_P);for(let i=0;i<n;i++)particles.push(new P());}
        function connect(){for(let a=0;a<particles.length;a++)for(let b=a+1;b<particles.length;b++){const dx=particles[a].x-particles[b].x,dy=particles[a].y-particles[b].y,dSq=dx*dx+dy*dy;if(dSq<CONNECT_SQ){const o=1-dSq/CONNECT_SQ;ctx.strokeStyle=`rgba(251,191,36,${o*.22})`;ctx.lineWidth=o*1.8;ctx.beginPath();ctx.moveTo(particles[a].x,particles[a].y);ctx.lineTo(particles[b].x,particles[b].y);ctx.stroke();}}}
        function animate(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw();});connect();requestAnimationFrame(animate);}
        initP(); animate();

        /* ── Store ── */
        const GENRE_COLORS={Rock:{bg:'#fce7f3',text:'#9d174d',art:'#fda4af'},Jazz:{bg:'#ede9fe',text:'#5b21b6',art:'#c4b5fd'},Soul:{bg:'#fef9c3',text:'#854d0e',art:'#fde047'},Pop:{bg:'#dcfce7',text:'#166534',art:'#86efac'}};
        const INVENTORY=[
            {id:1,title:'Abbey Road',artist:'The Beatles',genre:'Rock',price:2500},
            {id:2,title:'The Dark Side of the Moon',artist:'Pink Floyd',genre:'Rock',price:2800},
            {id:3,title:'Rumours',artist:'Fleetwood Mac',genre:'Rock',price:2200},
            {id:4,title:'Born to Run',artist:'Bruce Springsteen',genre:'Rock',price:1900},
            {id:5,title:'Kind of Blue',artist:'Miles Davis',genre:'Jazz',price:2100},
            {id:6,title:'A Love Supreme',artist:'John Coltrane',genre:'Jazz',price:2400},
            {id:7,title:'Time Out',artist:'The Dave Brubeck Quartet',genre:'Jazz',price:1800},
            {id:8,title:"What's Going On",artist:'Marvin Gaye',genre:'Soul',price:2300},
            {id:9,title:'Songs in the Key of Life',artist:'Stevie Wonder',genre:'Soul',price:2600},
            {id:10,title:'I Never Loved a Man the Way I Love You',artist:'Aretha Franklin',genre:'Soul',price:1950},
            {id:11,title:'Thriller',artist:'Michael Jackson',genre:'Pop',price:2000},
            {id:12,title:'21',artist:'Adele',genre:'Pop',price:1700}
        ];

        let cart={},activeFilter='all';
        function formatPHP(n){return '₱'+n.toLocaleString('en-PH');}
        function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

        function renderProducts(){
            document.getElementById('productGrid').innerHTML=INVENTORY.map(item=>{
                const c=GENRE_COLORS[item.genre],hidden=activeFilter!=='all'&&item.genre!==activeFilter?'hidden':'';
                return `<div class="product-card ${hidden}" data-genre="${item.genre}"><div class="album-art" style="background:${c.art}">🎵</div><div class="product-info"><div class="album-title">${escapeHtml(item.title)}</div><div class="album-artist">${escapeHtml(item.artist)}</div><div class="genre-badge" style="background:${c.bg};color:${c.text}">${item.genre}</div><div class="price">${formatPHP(item.price)}</div></div><button class="add-btn" onclick="addToCart(${item.id})">+ Add to Cart</button></div>`;
            }).join('');
            document.querySelectorAll('.product-card,.add-btn').forEach(el=>{el.addEventListener('mouseenter',()=>halo.classList.add('active'));el.addEventListener('mouseleave',()=>halo.classList.remove('active'));});
        }

        function filterBy(genre,btn){activeFilter=genre;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.product-card').forEach(c=>{(genre==='all'||c.dataset.genre===genre)?c.classList.remove('hidden'):c.classList.add('hidden');});}
        function addToCart(id){cart[id]=(cart[id]||0)+1;updateCartUI();}
        function updateQty(id,delta){cart[id]=(cart[id]||0)+delta;if(cart[id]<=0)delete cart[id];updateCartUI();renderCartSidebar();}
        function removeFromCart(id){delete cart[id];updateCartUI();renderCartSidebar();}
        function getTotalQty(){return Object.values(cart).reduce((s,q)=>s+q,0);}
        function getSubtotal(){return Object.entries(cart).reduce((s,[id,qty])=>{const item=INVENTORY.find(i=>i.id===parseInt(id));return s+(item?item.price*qty:0);},0);}

        function updateCartUI(){
            const qty=getTotalQty(),badge=document.getElementById('cartBadge');
            qty>0?(badge.textContent=qty,badge.classList.remove('hidden')):badge.classList.add('hidden');
            document.getElementById('subtotalAmount').textContent=formatPHP(getSubtotal());
            document.getElementById('checkoutBtn').disabled=qty===0;
        }

        function renderCartSidebar(){
            const container=document.getElementById('cartItems'),ids=Object.keys(cart);
            if(!ids.length){container.innerHTML='<div class="cart-empty">Your cart is empty.<br>Add some records!</div>';return;}
            container.innerHTML=ids.map(id=>{const item=INVENTORY.find(i=>i.id===parseInt(id)),qty=cart[id],c=GENRE_COLORS[item.genre];return `<div class="cart-item"><div class="cart-item-art" style="background:${c.art}">🎵</div><div class="cart-item-info"><div class="cart-item-name">${escapeHtml(item.title)}</div><div class="cart-item-price">${formatPHP(item.price)} each</div></div><div class="qty-controls"><button class="qty-btn" onclick="updateQty(${item.id},-1)">−</button><span class="qty-display">${qty}</span><button class="qty-btn" onclick="updateQty(${item.id},1)">+</button></div><button class="remove-item-btn" onclick="removeFromCart(${item.id})" title="Remove">×</button></div>`;}).join('');
        }

        function openCart(){renderCartSidebar();document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartSidebar').classList.add('open');}
        function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartSidebar').classList.remove('open');}
        function openCheckoutModal(){closeCart();document.getElementById('checkoutModal').classList.add('open');}
        function closeCheckoutModal(){document.getElementById('checkoutModal').classList.remove('open');}

        renderProducts();
    </script>

</body>
</html>
