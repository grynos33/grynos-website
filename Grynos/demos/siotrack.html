<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Dashboard — Manufacturer Order Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --accent-1: #fbbf24;
            --accent-2: #f59e0b;
            --accent-3: #14b8a6;
            --text: #1f2937;
            --muted: #6b7280;
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: rgba(255,255,255,0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-glow { position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(251,191,36,.12) 0%, transparent 65%); z-index: 0; pointer-events: none; }

        .cursor-dot, .cursor-halo { position: fixed; top: 0; left: 0; border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 9999; }
        .cursor-dot { width: 8px; height: 8px; background: var(--accent-2); box-shadow: 0 0 10px var(--accent-1); }
        .cursor-halo { width: 40px; height: 40px; border: 1px solid rgba(245,158,11,.6); transition: width .3s, height .3s, background .3s; }
        .cursor-halo.active { width: 60px; height: 60px; background: rgba(251,191,36,.1); border-color: var(--accent-2); }

        /* Header */
        .header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; flex-direction: column; }
        .logo { font-size: 1.25rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 0.75rem; color: var(--muted); margin-top: 1px; font-weight: 600; }
        .back-link { color: var(--muted); text-decoration: none; font-size: .82rem; font-weight: 600; transition: color .2s; }
        .back-link:hover { color: var(--accent-2); }

        /* Main */
        .main { max-width: 960px; margin: 0 auto; padding: 28px 16px 56px; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; }

        /* Stat cards */
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 18px; padding: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .stat-number { font-size: 2rem; font-weight: 800; line-height: 1; }
        .stat-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 4px; }

        /* Table card */
        .table-card { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .table-header { padding: 18px 22px; border-bottom: 1px solid rgba(0,0,0,.06); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .table-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

        /* Filter tabs */
        .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-tab { background: transparent; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 20px; padding: 5px 14px; font-family: 'Outfit',sans-serif; font-size: .78rem; font-weight: 600; color: var(--muted); transition: all .15s; white-space: nowrap; }
        .filter-tab:hover { border-color: var(--accent-2); color: var(--text); }
        .filter-tab.active { background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border-color: transparent; color: #111; box-shadow: 0 2px 8px rgba(251,191,36,0.35); }

        /* Table */
        .orders-table { width: 100%; border-collapse: collapse; }
        .orders-table th { text-align: left; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 10px 22px; border-bottom: 1px solid rgba(0,0,0,.06); background: rgba(255,255,255,0.3); }
        .orders-table td { padding: 13px 22px; border-bottom: 1px solid rgba(0,0,0,.04); font-size: .88rem; vertical-align: middle; }
        .orders-table tr:last-child td { border-bottom: none; }
        .orders-table tbody tr:hover td { background: rgba(251,191,36,.04); }

        .order-id { font-weight: 700; font-family: monospace; font-size: .82rem; color: var(--accent-2); }
        .product-name { font-weight: 600; }
        .customer-name { color: var(--muted); }
        .date-cell { color: var(--muted); font-size: .82rem; }
        .qty-cell { font-weight: 700; }

        /* Status pills */
        .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 700; border: none; font-family: 'Outfit',sans-serif; transition: opacity .15s, transform .1s; white-space: nowrap; }
        .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-pill:hover { opacity: .8; }
        .status-pill:active { transform: scale(.96); }
        .status-pill.pending    { background: rgba(251,191,36,.18); color: #92400e; }
        .status-pill.production { background: rgba(59,130,246,.12); color: #1d4ed8; }
        .status-pill.shipped    { background: rgba(139,92,246,.12); color: #5b21b6; }
        .status-pill.delivered  { background: rgba(16,185,129,.12); color: #065f46; }

        .order-row.hidden { display: none; }
        .hint { text-align: center; font-size: .78rem; color: var(--muted); padding: 14px; border-top: 1px solid rgba(0,0,0,.05); }

        @media (max-width: 640px) { .stats-row { grid-template-columns: repeat(2,1fr); } .orders-table th:nth-child(4), .orders-table td:nth-child(4) { display: none; } }
        @media (max-width: 480px) { .orders-table th:nth-child(5), .orders-table td:nth-child(5) { display: none; } }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-halo" id="cursorHalo"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="bg-glow"></div>

    <header class="header">
        <div class="header-left">
            <div class="logo">Order Dashboard</div>
            <div class="subtitle">Manufacturer Order Tracker</div>
        </div>
        <a href="https://grynos.info" class="back-link">← Back to grynos.info</a>
    </header>

    <main class="main">

        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="statTotal" style="color:var(--text)">12</div><div class="stat-title">Total Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="statPending" style="color:#92400e">0</div><div class="stat-title">Pending</div></div>
            <div class="stat-card"><div class="stat-number" id="statProduction" style="color:#1d4ed8">0</div><div class="stat-title">In Production</div></div>
            <div class="stat-card"><div class="stat-number" id="statShipped" style="color:#5b21b6">0</div><div class="stat-title">Shipped</div></div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <div class="table-title">Orders</div>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterOrders('all')">All</button>
                    <button class="filter-tab" onclick="filterOrders('pending')">Pending</button>
                    <button class="filter-tab" onclick="filterOrders('production')">In Production</button>
                    <button class="filter-tab" onclick="filterOrders('shipped')">Shipped</button>
                    <button class="filter-tab" onclick="filterOrders('delivered')">Delivered</button>
                </div>
            </div>
            <div style="overflow-x:auto">
                <table class="orders-table">
                    <thead><tr><th>Order ID</th><th>Product</th><th>Qty</th><th>Customer</th><th>Date</th><th>Status</th></tr></thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            </div>
            <div class="hint">💡 Click any status pill to advance it to the next stage</div>
        </div>

    </main>

    <script>
        /* ── Cursor ── */
        const dot = document.getElementById('cursorDot'), halo = document.getElementById('cursorHalo');
        document.addEventListener('mousemove', e => { dot.style.left=halo.style.left=e.clientX+'px'; dot.style.top=halo.style.top=e.clientY+'px'; });
        document.querySelectorAll('button,a').forEach(el=>{el.addEventListener('mouseenter',()=>halo.classList.add('active'));el.addEventListener('mouseleave',()=>halo.classList.remove('active'));});

        /* ── Particles ── */
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        let W, H, particles = [];
        const CONNECT_SQ = 120*120, MAX_P = 80;
        function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
        window.addEventListener('resize',()=>{resize();initP();}); resize();
        class P{constructor(){this.reset();}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.5;this.vy=(Math.random()-.5)*.5;this.r=Math.random()*2+1;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(245,158,11,0.35)';ctx.fill();}}
        function initP(){particles=[];const n=Math.min(Math.floor(W*H/9000),MAX_P);for(let i=0;i<n;i++)particles.push(new P());}
        function connect(){for(let a=0;a<particles.length;a++)for(let b=a+1;b<particles.length;b++){const dx=particles[a].x-particles[b].x,dy=particles[a].y-particles[b].y,dSq=dx*dx+dy*dy;if(dSq<CONNECT_SQ){const o=1-dSq/CONNECT_SQ;ctx.strokeStyle=`rgba(251,191,36,${o*.22})`;ctx.lineWidth=o*1.8;ctx.beginPath();ctx.moveTo(particles[a].x,particles[a].y);ctx.lineTo(particles[b].x,particles[b].y);ctx.stroke();}}}
        function animate(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw();});connect();requestAnimationFrame(animate);}
        initP(); animate();

        /* ── App ── */
        const STATUS_CYCLE = ['pending','production','shipped','delivered'];
        const STATUS_LABELS = {pending:'Pending',production:'In Production',shipped:'Shipped',delivered:'Delivered'};
        const ORDERS = [
            {id:'#ORD-001',product:'Ceramic Mug Set',qty:200,customer:'Liza Reyes',date:'Mar 1',status:'delivered'},
            {id:'#ORD-002',product:'Bamboo Cutting Board',qty:150,customer:'Rico Santos',date:'Mar 3',status:'delivered'},
            {id:'#ORD-003',product:'Steel Water Bottle',qty:500,customer:'Myla Aquino',date:'Mar 6',status:'shipped'},
            {id:'#ORD-004',product:'Linen Tote Bag',qty:300,customer:'Jo Buenaventura',date:'Mar 8',status:'shipped'},
            {id:'#ORD-005',product:'Wooden Coaster Pack',qty:120,customer:'Ana Villanueva',date:'Mar 10',status:'production'},
            {id:'#ORD-006',product:'Cork Yoga Mat',qty:80,customer:'Dan Mercado',date:'Mar 11',status:'production'},
            {id:'#ORD-007',product:'Glass Spice Jar Set',qty:400,customer:'Trish Gomez',date:'Mar 13',status:'production'},
            {id:'#ORD-008',product:'Rattan Storage Basket',qty:60,customer:'Kiko Dela Cruz',date:'Mar 14',status:'pending'},
            {id:'#ORD-009',product:'Beeswax Candle Set',qty:250,customer:'Mariz Espiritu',date:'Mar 15',status:'pending'},
            {id:'#ORD-010',product:'Coconut Shell Bowl',qty:180,customer:'Nico Bautista',date:'Mar 16',status:'pending'},
            {id:'#ORD-011',product:'Macrame Wall Hanging',qty:45,customer:'Sofia Fernandez',date:'Mar 17',status:'pending'},
            {id:'#ORD-012',product:'Abaca Table Runner',qty:90,customer:'Ben Castillo',date:'Mar 18',status:'pending'},
        ];

        let currentFilter = 'all';

        function cycleStatus(orderId) {
            const o = ORDERS.find(o=>o.id===orderId);
            if (!o) return;
            o.status = STATUS_CYCLE[(STATUS_CYCLE.indexOf(o.status)+1) % STATUS_CYCLE.length];
            renderTable(); updateStats();
        }

        function renderTable() {
            document.getElementById('ordersBody').innerHTML = ORDERS.map(o => {
                const hidden = currentFilter!=='all' && o.status!==currentFilter ? 'hidden' : '';
                return `<tr class="order-row ${hidden}"><td><span class="order-id">${o.id}</span></td><td><span class="product-name">${o.product}</span></td><td class="qty-cell">${o.qty.toLocaleString()}</td><td class="customer-name">${o.customer}</td><td class="date-cell">${o.date}</td><td><button class="status-pill ${o.status}" onclick="cycleStatus('${o.id}')">${STATUS_LABELS[o.status]}</button></td></tr>`;
            }).join('');
        }

        function updateStats() {
            const c = {pending:0,production:0,shipped:0,delivered:0};
            ORDERS.forEach(o=>c[o.status]++);
            document.getElementById('statTotal').textContent = ORDERS.length;
            document.getElementById('statPending').textContent = c.pending;
            document.getElementById('statProduction').textContent = c.production;
            document.getElementById('statShipped').textContent = c.shipped;
        }

        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach((b,i)=>b.classList.toggle('active',['all','pending','production','shipped','delivered'][i]===filter));
            renderTable();
        }

        renderTable(); updateStats();
    </script>

</body>
</html>
